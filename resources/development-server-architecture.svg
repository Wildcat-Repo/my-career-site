<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f5f5f5" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Development Server Implementation Architecture</text>
  
  <!-- Hardware Layer -->
  <rect x="100" y="480" width="600" height="80" fill="#ffebee" stroke="#c62828" stroke-width="2" rx="8" ry="8"/>
  <text x="400" y="510" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#c62828">Hardware</text>
  <text x="400" y="535" font-family="Arial" font-size="14" text-anchor="middle" fill="#333">Dell OptiPlex 740 (8GB RAM, 1TB SSD)</text>
  
  <!-- OS Layer -->
  <rect x="100" y="400" width="600" height="60" fill="#e8eaf6" stroke="#3949ab" stroke-width="2" rx="8" ry="8"/>
  <text x="400" y="435" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#3949ab">Debian 12 "Bookworm"</text>
  
  <!-- Service Container Layer -->
  <rect x="100" y="80" width="600" height="300" fill="#f5f5f5" stroke="#616161" stroke-width="2" rx="10" ry="10"/>
  <text x="400" y="105" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#616161">Development Services</text>
  
  <!-- Gitea Service -->
  <rect x="130" y="130" width="250" height="220" fill="#e0f2f1" stroke="#00796b" stroke-width="2" rx="8" ry="8"/>
  <text x="255" y="155" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#00796b">Gitea</text>
  <text x="255" y="175" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Self-hosted Git Service</text>
  
  <!-- Gitea Components -->
  <rect x="150" y="190" width="210" height="30" fill="#b2dfdb" stroke="#00796b" stroke-width="1" rx="4" ry="4"/>
  <text x="255" y="210" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Repository Management</text>
  
  <rect x="150" y="230" width="210" height="30" fill="#b2dfdb" stroke="#00796b" stroke-width="1" rx="4" ry="4"/>
  <text x="255" y="250" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Web Interface (Port 3000)</text>
  
  <rect x="150" y="270" width="210" height="30" fill="#b2dfdb" stroke="#00796b" stroke-width="1" rx="4" ry="4"/>
  <text x="255" y="290" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">User Authentication</text>
  
  <rect x="150" y="310" width="210" height="30" fill="#b2dfdb" stroke="#00796b" stroke-width="1" rx="4" ry="4"/>
  <text x="255" y="330" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Integrated CI/CD</text>
  
  <!-- Jupyter Service -->
  <rect x="420" y="130" width="250" height="220" fill="#e1f5fe" stroke="#0288d1" stroke-width="2" rx="8" ry="8"/>
  <text x="545" y="155" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#0288d1">Jupyter</text>
  <text x="545" y="175" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Data Science Environment</text>
  
  <!-- Jupyter Components -->
  <rect x="440" y="190" width="210" height="30" fill="#b3e5fc" stroke="#0288d1" stroke-width="1" rx="4" ry="4"/>
  <text x="545" y="210" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">JupyterHub (Multi-user)</text>
  
  <rect x="440" y="230" width="210" height="30" fill="#b3e5fc" stroke="#0288d1" stroke-width="1" rx="4" ry="4"/>
  <text x="545" y="250" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">JupyterLab (Web IDE)</text>
  
  <rect x="440" y="270" width="210" height="30" fill="#b3e5fc" stroke="#0288d1" stroke-width="1" rx="4" ry="4"/>
  <text x="545" y="290" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Notebook Interface (Port 8888)</text>
  
  <rect x="440" y="310" width="210" height="30" fill="#b3e5fc" stroke="#0288d1" stroke-width="1" rx="4" ry="4"/>
  <text x="545" y="330" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Multiple Python Environments</text>
  
  <!-- User Connections -->
  <circle cx="255" cy="60" r="20" fill="#e0f7fa" stroke="#006064" stroke-width="2"/>
  <text x="255" y="65" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#006064">G</text>
  
  <circle cx="545" cy="60" r="20" fill="#e0f7fa" stroke="#006064" stroke-width="2"/>
  <text x="545" y="65" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#006064">J</text>
  
  <line x1="255" y1="80" x2="255" y2="130" stroke="#006064" stroke-width="2" stroke-dasharray="5,5"/>
  <polygon points="255,130 250,120 260,120" fill="#006064"/>
  
  <line x1="545" y1="80" x2="545" y2="130" stroke="#006064" stroke-width="2" stroke-dasharray="5,5"/>
  <polygon points="545,130 540,120 550,120" fill="#006064"/>
  
  <!-- Networking Layer -->
  <rect x="100" y="350" width="600" height="30" fill="#fff3e0" stroke="#f57c00" stroke-width="2" rx="8" ry="8"/>
  <text x="400" y="370" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#f57c00">Local Network Access (192.168.1.x)</text>
  
  <!-- Maintenance Tools -->
  <rect x="700" y="200" width="30" height="130" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5" ry="5" transform="rotate(270 715 265)"/>
  <text x="715" y="240" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#388e3c" transform="rotate(270 715 240)">Maintenance Tools</text>
  
  <rect x="640" y="275" width="150" height="25" fill="#c8e6c9" stroke="#388e3c" stroke-width="1" rx="3" ry="3"/>
  <text x="715" y="292" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">Repository Migration Scripts</text>
  
  <rect x="640" y="305" width="150" height="25" fill="#c8e6c9" stroke="#388e3c" stroke-width="1" rx="3" ry="3"/>
  <text x="715" y="322" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">Environment Setup Scripts</text>
  
  <!-- Legend -->
  <rect x="120" y="570" width="12" height="12" fill="#ffebee" stroke="#c62828" stroke-width="1"/>
  <text x="140" y="580" font-family="Arial" font-size="10" fill="#333">Hardware</text>
  
  <rect x="220" y="570" width="12" height="12" fill="#e8eaf6" stroke="#3949ab" stroke-width="1"/>
  <text x="240" y="580" font-family="Arial" font-size="10" fill="#333">OS</text>
  
  <rect x="320" y="570" width="12" height="12" fill="#e0f2f1" stroke="#00796b" stroke-width="1"/>
  <text x="340" y="580" font-family="Arial" font-size="10" fill="#333">Gitea</text>
  
  <rect x="420" y="570" width="12" height="12" fill="#e1f5fe" stroke="#0288d1" stroke-width="1"/>
  <text x="440" y="580" font-family="Arial" font-size="10" fill="#333">Jupyter</text>
  
  <rect x="520" y="570" width="12" height="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
  <text x="540" y="580" font-family="Arial" font-size="10" fill="#333">Tools</text>
</svg>