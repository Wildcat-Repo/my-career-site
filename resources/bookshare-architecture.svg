<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#f9f9f9" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">Bookshare Application Architecture</text>
  
  <!-- Frontend Layer -->
  <rect x="150" y="80" width="500" height="100" fill="#e1f5fe" stroke="#0288d1" stroke-width="2" rx="5" ry="5"/>
  <text x="400" y="100" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#0288d1">Frontend (React + Vite)</text>
  
  <!-- Frontend Components -->
  <rect x="180" y="120" width="100" height="40" fill="#bbdefb" stroke="#0288d1" stroke-width="1" rx="3" ry="3"/>
  <text x="230" y="145" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Components</text>
  
  <rect x="300" y="120" width="100" height="40" fill="#bbdefb" stroke="#0288d1" stroke-width="1" rx="3" ry="3"/>
  <text x="350" y="145" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Contexts</text>
  
  <rect x="420" y="120" width="100" height="40" fill="#bbdefb" stroke="#0288d1" stroke-width="1" rx="3" ry="3"/>
  <text x="470" y="145" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Hooks</text>
  
  <rect x="540" y="120" width="80" height="40" fill="#bbdefb" stroke="#0288d1" stroke-width="1" rx="3" ry="3"/>
  <text x="580" y="145" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Utils</text>
  
  <!-- API Layer -->
  <rect x="150" y="220" width="500" height="100" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5" ry="5"/>
  <text x="400" y="240" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#388e3c">Backend (FastAPI)</text>
  
  <!-- API Components -->
  <rect x="180" y="260" width="100" height="40" fill="#c8e6c9" stroke="#388e3c" stroke-width="1" rx="3" ry="3"/>
  <text x="230" y="285" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">API Routes</text>
  
  <rect x="300" y="260" width="100" height="40" fill="#c8e6c9" stroke="#388e3c" stroke-width="1" rx="3" ry="3"/>
  <text x="350" y="285" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Auth</text>
  
  <rect x="420" y="260" width="100" height="40" fill="#c8e6c9" stroke="#388e3c" stroke-width="1" rx="3" ry="3"/>
  <text x="470" y="285" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Schemas</text>
  
  <rect x="540" y="260" width="80" height="40" fill="#c8e6c9" stroke="#388e3c" stroke-width="1" rx="3" ry="3"/>
  <text x="580" y="285" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Web</text>
  
  <!-- Database Layer -->
  <rect x="150" y="360" width="500" height="80" fill="#fff3e0" stroke="#f57c00" stroke-width="2" rx="5" ry="5"/>
  <text x="400" y="380" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle" fill="#f57c00">Database (PostgreSQL)</text>
  
  <rect x="250" y="400" width="100" height="30" fill="#ffe0b2" stroke="#f57c00" stroke-width="1" rx="3" ry="3"/>
  <text x="300" y="420" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Books</text>
  
  <rect x="450" y="400" width="100" height="30" fill="#ffe0b2" stroke="#f57c00" stroke-width="1" rx="3" ry="3"/>
  <text x="500" y="420" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Users</text>
  
  <!-- Connection Lines -->
  <!-- Frontend to API -->
  <line x1="400" y1="180" x2="400" y2="220" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
  <polygon points="400,220 395,210 405,210" fill="#666"/>
  
  <!-- API to Database -->
  <line x1="400" y1="320" x2="400" y2="360" stroke="#666" stroke-width="2" stroke-dasharray="5,5"/>
  <polygon points="400,360 395,350 405,350" fill="#666"/>
  
  <!-- Additional elements - Environment Support -->
  <rect x="50" y="160" width="80" height="160" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5" ry="5" transform="rotate(-90 50 240)"/>
  <text x="50" y="245" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#9c27b0" transform="rotate(-90 50 240)">Environments</text>
  
  <text x="90" y="210" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">Development</text>
  <text x="90" y="240" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">Staging</text>
  <text x="90" y="270" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">Production</text>
  
  <!-- CI/CD Pipeline -->
  <rect x="670" y="160" width="80" height="160" fill="#e1bee7" stroke="#9c27b0" stroke-width="2" rx="5" ry="5" transform="rotate(90 670 240)"/>
  <text x="670" y="245" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle" fill="#9c27b0" transform="rotate(90 670 240)">CI/CD Pipeline</text>
  
  <text x="630" y="210" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">Test</text>
  <text x="630" y="240" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">Build</text>
  <text x="630" y="270" font-family="Arial" font-size="10" text-anchor="middle" fill="#333">Deploy</text>
  
  <!-- Legends -->
  <rect x="640" y="440" width="15" height="15" fill="#e1f5fe" stroke="#0288d1" stroke-width="1"/>
  <text x="665" y="452" font-family="Arial" font-size="12" fill="#333">Frontend</text>
  
  <rect x="640" y="460" width="15" height="15" fill="#e8f5e9" stroke="#388e3c" stroke-width="1"/>
  <text x="665" y="472" font-family="Arial" font-size="12" fill="#333">Backend</text>
  
  <rect x="640" y="480" width="15" height="15" fill="#fff3e0" stroke="#f57c00" stroke-width="1"/>
  <text x="665" y="492" font-family="Arial" font-size="12" fill="#333">Database</text>
</svg>