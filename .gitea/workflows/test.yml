name: E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    container:
      image: cypress/browsers:node-${{ matrix.node-version }}-chrome-stable

    strategy:
      fail-fast: false
      matrix:
        # Run tests on different node versions
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Verify Cypress installation
        run: npm run cy:verify

      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 60000
        env:
          CI: true

      - name: Run Cypress tests
        run: npm test
        env:
          CI: true

      - name: Upload test screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ matrix.node-version }}
          path: cypress/screenshots
          retention-days: 7

      - name: Upload test videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos-${{ matrix.node-version }}
          path: cypress/videos
          retention-days: 7
