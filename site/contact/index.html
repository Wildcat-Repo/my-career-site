<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Theron Blount</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="contact.css">
</head>
<body>
<header>
  <nav>
    <a href="../index.html">Home</a>
    <a href="../about/">About</a>
    <a href="../portfolio/">Portfolio</a>
    <a href="../research/">Research</a>
    <a href="../contact/" aria-current="page">Contact</a>
  </nav>
</header>

<main>
  <h1>Contact Me</h1>
  <p>
    If you would like to get in touch, please reach out via email at <a href="mailto:tsblount@gmail.com">tsblount@gmail.com</a>
  </p>

  <section class="social-media">
    <h2 class="social-media__title">Connect With Me</h2>
    <div class="social-media__navigation">
      <ul class="social-media__list">
        <li class="social-media__item">
          <a href="https://linkedin.com/in/tblount"
             class="social-media__link"
             target="_blank"
             rel="noopener noreferrer me"
             aria-label="Visit my LinkedIn profile">
          <span class="icon icon-linkedin" aria-hidden="true" role="img">
            <title>LinkedIn</title>
          </span>
            <span class="social-media__label">LinkedIn</span>
          </a>
        </li>
        <li class="social-media__item">
          <a href="https://github.com/straightjacket/portfolio"
             class="social-media__link"
             target="_blank"
             rel="noopener noreferrer me"
             aria-label="Check out my projects on GitHub">
          <span class="icon icon-github" aria-hidden="true" role="img">
            <title>GitHub</title>
          </span>
            <span class="social-media__label">GitHub</span>
          </a>
        </li>
        <li class="social-media__item">
          <a href="https://twitter.com/chilly_t"
             class="social-media__link"
             target="_blank"
             rel="noopener noreferrer me"
             aria-label="Follow me on Twitter">
          <span class="icon icon-twitter" aria-hidden="true" role="img">
            <title>Twitter</title>
          </span>
            <span class="social-media__label">Twitter</span>
          </a>
        </li>
      </ul>
    </div>
  </section>

</main>
<footer>
  <p>&copy;
    <time datetime="2025">2025</time>
    Theron Blount. All rights reserved.
  </p>
</footer>
</body>
</html>
